version: "3.8"

# =============================================================
#  Kisan Mitra — Docker Compose
#
#  OPTION A: Railway (recommended — set LLM_PROVIDER=groq)
#    Only the 'api' service is needed. Deploy via railway.toml.
#
#  OPTION B: Self-hosted VPS (set LLM_PROVIDER=ollama)
#    Run all services: docker compose up -d
# =============================================================

services:

  # ---------- FastAPI backend ----------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kisan-mitra-api
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    networks:
      - kisan-net

  # ---------- Streamlit admin dashboard ----------
  admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kisan-mitra-admin
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - API_BASE_URL=http://api:8000
    command: >
      streamlit run admin_dashboard.py
        --server.port=8501
        --server.address=0.0.0.0
        --server.headless=true
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - kisan-net

  # ---------- Ollama LLM (only for self-hosted VPS) ----------
  # Uncomment below if using LLM_PROVIDER=ollama on a VPS
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: kisan-mitra-ollama
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped
  #   networks:
  #     - kisan-net
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
  #     interval: 30s
  #     timeout: 10s
  #     start_period: 20s
  #     retries: 3
  #
  # Also add to api service:
  #   environment:
  #     - OLLAMA_BASE_URL=http://ollama:11434
  #     - LLM_PROVIDER=ollama

# volumes:
#   ollama_data:

networks:
  kisan-net:
    driver: bridge
