version: "3.8"

services:
  api:
    build: .
    container_name: kisan-mitra-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  ollama:
    image: ollama/ollama:latest
    container_name: kisan-mitra-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Pull the model after first start:
    # docker exec kisan-mitra-ollama ollama pull llama3.1:8b

  admin:
    build: .
    container_name: kisan-mitra-admin
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000
    command: streamlit run admin_dashboard.py --server.port=8501 --server.address=0.0.0.0
    depends_on:
      - api
    restart: unless-stopped

volumes:
  ollama_data:
