# Kisan Mitra — Nginx reverse proxy config
# Replace YOUR_DOMAIN with your actual domain (e.g. kisanmitra.yourdomain.com)

upstream fastapi {
    server api:8000;
}

upstream streamlit {
    server admin:8501;
}

# --- HTTP → HTTPS redirect ---
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS server ---
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # SSL certs (use Let's Encrypt / Certbot)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # --- FastAPI (API + WhatsApp webhook) ---
    location / {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Ollama responses can be slow on VPS
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
    }

    # --- WhatsApp webhook (explicit, higher timeout) ---
    location /webhook/ {
        proxy_pass http://fastapi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # --- Streamlit admin dashboard ---
    location /admin/ {
        proxy_pass http://streamlit/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamlit websockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Health check (no auth) ---
    location /health {
        proxy_pass http://fastapi/health;
    }
}
